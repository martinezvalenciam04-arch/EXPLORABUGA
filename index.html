<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Explora Buga</title>

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" sizes="512x512" href="img/icon-512.png.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Explora Buga">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

</head>
<body>

<!-- PANTALLA DE BIENVENIDA -->

<section id="bienvenida">


<div class="overlay">

<h1>Explora Buga</h1>
<p>Descubre los mejores lugares de la ciudad</p>

<button onclick="entrarApp()">Explorar</button>

</div>

</section>


<!-- APP -->

<section id="app">

<header>

<button class="btn-regresar" onclick="volverInicio()">Regresar</button>

Explora Buga

</header>


<!-- BUSCADOR -->

<div class="buscador">

<input type="text" id="buscarLugar" placeholder="Buscar lugares...">

</div>


<!-- CATEGORIAS -->

<div class="categorias">

<div class="categoria" onclick="filtrar('todos')">🌎<p>Todos</p></div>

<div class="categoria" onclick="filtrar('parque')">🌳<p>Parques</p></div>

<div class="categoria" onclick="filtrar('restaurante')">🍽<p>Restaurantes</p></div>

<div class="categoria" onclick="filtrar('cafe')">☕<p>Cafés</p></div>

<div class="categoria" onclick="filtrar('reserva')">🌿<p>Reservas</p></div>

<div class="categoria" onclick="filtrar('cascada')">💧<p>Cascadas</p></div>

</div>


<!-- DESTINOS -->

<div class="lugares">


<!-- BASILICA -->

<div class="tarjeta parque">

<img src="img/basilica.jpg.png">

<div class="info">

<h3>Basílica del Señor</h3>

<p>Centro histórico de Buga</p>

<button onclick="verActividades('basilica')">Qué hacer</button>

<button onclick="irLugar(3.9007,-76.2970)">Cómo llegar</button>

</div>

</div>


<!-- PARQUE -->

<div class="tarjeta parque">

<img src="img/parque.jpg.png">

<div class="info">

<h3>Parque Cabal</h3>

<p>Plaza principal de la ciudad</p>

<button onclick="verActividades('parque')">Qué hacer</button>

<button onclick="irLugar(3.8986,-76.3020)">Cómo llegar</button>

</div>

</div>


<!-- CASCADA -->

<div class="tarjeta cascada">

<img src="img/cascada.jpg.png">

<div class="info">

<h3>Cascada del Milagroso</h3>

<p>Ubicada a 5 km de Buga</p>

<button onclick="verActividades('cascada')">Qué hacer</button>

<button onclick="irLugar(3.887,-76.33)">Cómo llegar</button>

</div>

</div>

</div>

</section>

<script src="js/script.js"></script>

</body>
</html>
